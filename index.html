<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newson Sportec | Bicycle Spoke Length Calculator</title>
  <style>
    
body {
  background: #f4f7fb;
  color: #1f2937;
  line-height: 1.6;
}

header {
  background: linear-gradient(135deg, #0f172a, #2563eb);
  color: white;
  padding: 28px 20px;
}

.header-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: white;
  color: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 24px;
  letter-spacing: 1px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.brand h1 {
  font-size: 30px;
  margin-bottom: 2px;
}

.brand p {
  color: #dbeafe;
  font-size: 15px;
}

.hero {
  max-width: 1100px;
  margin: 34px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 24px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 26px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
}

.intro h2, .calculator h2, .explanation h2 {
  color: #0f172a;
  margin-bottom: 14px;
  font-size: 26px;
}

.intro p {
  margin-bottom: 12px;
}

.note {
  background: #eff6ff;
  border-left: 5px solid #2563eb;
  padding: 14px;
  border-radius: 10px;
  margin-top: 16px;
  font-size: 15px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 18px;
}

label {
  display: block;
  font-weight: 700;
  margin-bottom: 6px;
  color: #334155;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}

input:focus, select:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

.results {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.result-box {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
}

.result-box h3 {
  color: #475569;
  font-size: 15px;
  margin-bottom: 6px;
}

.result-box .number {
  font-size: 34px;
  font-weight: 800;
  color: #2563eb;
}

.warning {
  color: #b91c1c;
  margin-top: 12px;
  font-weight: 700;
  display: none;
}

.explanation {
  max-width: 1100px;
  margin: 0 auto 40px;
  padding: 0 20px;
}

.formula {
  background: #0f172a;
  color: white;
  padding: 18px;
  border-radius: 14px;
  margin: 18px 0;
  overflow-x: auto;
  font-size: 18px;
}

ul {
  margin-left: 20px;
  margin-top: 12px;
}

footer {
  text-align: center;
  padding: 24px 20px;
  background: #0f172a;
  color: #cbd5e1;
  font-size: 14px;
}

@media (max-width: 820px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .form-grid, .results {
    grid-template-columns: 1fr;
  }

  .brand h1 {
    font-size: 24px;
  }
}
  <div class="card calculator">
    <h2>Spoke Length Calculator</h2>
    <div class="form-grid">
      <div>
        <label for="erd">Rim ERD (mm)</label>
        <input id="erd" type="number" value="602" />
      </div>

      <div>
        <label for="spokes">Total Spoke Count</label>
        <input id="spokes" type="number" value="32" />
      </div>

      <div>
        <label for="leftFlangeDiameter">Left Flange Diameter (mm)</label>
        <input id="leftFlangeDiameter" type="number" value="58" />
      </div>

      <div>
        <label for="rightFlangeDiameter">Right Flange Diameter (mm)</label>
        <input id="rightFlangeDiameter" type="number" value="58" />
      </div>

      <div>
        <label for="leftCenter">Center to Left Flange (mm)</label>
        <input id="leftCenter" type="number" value="35" />
      </div>

      <div>
        <label for="rightCenter">Center to Right Flange (mm)</label>
        <input id="rightCenter" type="number" value="20" />
      </div>

      <div>
        <label for="crosses">Cross Pattern</label>
        <select id="crosses">
          <option value="0">Radial / 0 Cross</option>
          <option value="1">1 Cross</option>
          <option value="2">2 Cross</option>
          <option value="3" selected>3 Cross</option>
          <option value="4">4 Cross</option>
        </select>
      </div>

      <div>
        <label for="spokeHole">Spoke Hole Diameter (mm)</label>
        <input id="spokeHole" type="number" value="2.5" step="0.1" />
      </div>
    </div>

    <button onclick="calculateSpokeLength()">Calculate Spoke Length</button>

    <div class="results">
      <div class="result-box">
        <h3>Left Spoke Length</h3>
        <div class="number"><span id="leftResult">—</span></div>
        <p>mm</p>
      </div>

      <div class="result-box">
        <h3>Right Spoke Length</h3>
        <div class="number"><span id="rightResult">—</span></div>
        <p>mm</p>
      </div>
    </div>

    <p id="warning" class="warning">Please enter valid numbers for all fields.</p>
  </div>
</section>

<section class="explanation">
  <div class="card">
    <h2>Formula Explanation</h2>
    <p>The calculator uses a common spoke length formula:</p>
    <div class="formula">
      L = √(R² + r² + d² − 2Rr × cos θ) − spoke hole adjustment
    </div>
    <ul>
      <li><strong>L</strong> = spoke length</li>
      <li><strong>R</strong> = rim radius, calculated as ERD ÷ 2</li>
      <li><strong>r</strong> = hub flange radius, calculated as flange diameter ÷ 2</li>
      <li><strong>d</strong> = center-to-flange distance</li>
      <li><strong>θ</strong> = spoke angle based on spoke count and cross pattern</li>
    </ul>
    <p style="margin-top: 14px;">
      This calculator gives an estimated spoke length. For production or professional wheel building,
      always confirm measurements with the rim and hub manufacturer specifications.
    </p>
  </div>

    </script>
</body>
</html>
</section>
